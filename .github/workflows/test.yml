name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run unit tests
        run: make test-unit

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu, alpine, debian]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.distro }}-${{ hashFiles(format('dockerfiles/Dockerfile.{0}', matrix.distro)) }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.distro }}-

      - name: Run integration tests (${{ matrix.distro }})
        run: make test-integration DISTRO=${{ matrix.distro }}
        timeout-minutes: 15
