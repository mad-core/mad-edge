name: Feature Request
description: Propose a new capability or behavior.
labels: ["type: feat", "status: needs-triage"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed? What problem does it solve? What user/operator pain does it remove?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Keep this high-level — implementation details belong in comments or the PR.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: >-
        If this adds or changes any request/response HTTP route under /v1, the matching
        MCP tool in src/mad/adapters/inbound/mcp/server.py MUST be added/changed in the
        same PR and test_http_mcp_parity.py must stay green (CLAUDE.md hard rule 13).
        Only the streaming SSE surface (GET /v1/events/stream) is exempt.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: Explicitly list what this issue does NOT cover to avoid scope creep.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related issues, prior art, design references.
    validations:
      required: false
