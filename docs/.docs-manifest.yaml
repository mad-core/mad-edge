# docs/.docs-manifest.yaml — local source of truth for this repo's /docs.
# Structure mirrors the org backend docs contract (9 numbered sections);
# triggers.paths / produces.params are adapted to this repo's actual tree.
#
# Mad-specific deviations from the generic contract (see the per-entry notes):
#   - 03-contracts/api.md  -> heuristic (CI installs only gen_docs, not this
#     package, so it cannot regenerate the OpenAPI dump; refresh locally).
#   - 05-operations/configuration.md -> heuristic (a central settings module
#     now exists at src/mad/core/config/settings.py (#97), but it is a
#     framework-free dataclass whose config KEYS are module-level constants,
#     not class fields, so the deterministic `config` generator — which
#     extracts class-field names — cannot regenerate the operator-facing
#     env-var catalog; the doc stays hand-authored/heuristic).
#   - 09-history/changelog.md -> heuristic, sourced from the semantic-release
#     package CHANGELOG.md, NOT a raw git log.

schema_version: 1
service: mad
domain: backend
generator_skill: generate-docs
bootstrap_commit: 7e3be29825257201e8b6cc0155d063d834dadbbb
docs:
- path: docs/README.md
  section: meta
  kind: manual
  description: |
    The local docs manual. Explains the /docs structure and what each section
    contains. Hand-authored once; rarely changes.
  triggers:
    discovery_hint: |
      No code path determines this. Structural/meta content. Leave `paths: []`.
    paths: []
    max_age_days: 365
  produces:
    type: manual
  adapted_heuristic: null
  acknowledged_at_commit: 1589bf78aa2f26aa2f99c505819402e5b3020f46

# ---- 01 overview --------------------------------------------------------
- path: docs/01-overview/passport.md
  section: overview
  kind: manual
  description: |
    One-page service card. Declares `service`/`domain`, the interface profile
    (http + sse + mcp + cli) and the section registry (which optional sections
    this repo declares). Feeds the cross-area service catalog.
  triggers:
    discovery_hint: |
      Intent-level. Profile changes when the service gains/loses a major
      interface (a new inbound adapter, a removed surface). Track by age.
    paths: []
    max_age_days: 180
  produces:
    type: manual
  adapted_heuristic: null
  acknowledged_at_commit: 1589bf78aa2f26aa2f99c505819402e5b3020f46
- path: docs/01-overview/context.md
  section: overview
  kind: manual
  description: |
    Upstream and downstream systems (who calls Mad, what Mad calls). Upstream:
    the requesting consumer over HTTP/MCP/CLI, GitHub for clones. Downstream:
    the external agent CLIs (claude, opencode) and the local workspace
    filesystem. Ideally a small mermaid context diagram.
  triggers:
    discovery_hint: |
      Architectural intent. Changes when new upstream/downstream systems are
      introduced — not derivable from a single source path.
    paths: []
    max_age_days: 180
  produces:
    type: manual
  adapted_heuristic: null
  acknowledged_at_commit: 1589bf78aa2f26aa2f99c505819402e5b3020f46
- path: docs/01-overview/domain.md
  section: overview
  kind: manual
  description: |
    The entities and business rules this service owns (Session, Event, Task,
    MountPath and the orchestration policies) — not the on-disk persistence
    layout, which is `02-architecture/data-model.md`.
  triggers:
    discovery_hint: |
      Business intent, not derivable from code alone. Track by age.
    paths: []
    max_age_days: 180
  produces:
    type: manual
  adapted_heuristic: null
  acknowledged_at_commit: 1589bf78aa2f26aa2f99c505819402e5b3020f46
- path: docs/01-overview/operations.md
  section: overview
  kind: heuristic
  description: |
    Catalog of the operations this service performs — one row per use case,
    with a one-line description, the input surface (HTTP route / MCP tool /
    consumed hook) and the observable side effects (events emitted, workspace
    actions). Grouped by bounded context (sessions, events, orchestration).
    The complement of `domain.md`: "what can the service DO, and when?".
  triggers:
    discovery_hint: |
      The application-logic layer (one module ~= one operation) plus the
      entrypoints that drive it. In this repo: the `use_cases/` packages under
      each core context, and the inbound adapters (http routes, mcp tools,
      internal hook ingestion).
    paths:
    - src/mad/core/sessions/use_cases/**
    - src/mad/core/events/use_cases/**
    - src/mad/core/orchestration/use_cases/**
    - src/mad/adapters/inbound/http/routes/**
    - src/mad/adapters/inbound/mcp/server.py
    - src/mad/adapters/inbound/internal/**
    hint: |
      A use case or an entrypoint changed (new/renamed/removed operation, new
      route or tool). Re-author the operations catalog and re-cross-reference
      each row with its HTTP route / MCP tool / consumed hook.
  produces:
    type: manual
  adapted_heuristic: |
    Re-author the operations catalog when: (1) a new use case is added under any `src/mad/core/*/use_cases/` subpackage (add one row per use case), (2) an HTTP endpoint is added/removed/renamed under `src/mad/adapters/inbound/http/routes/` (keep HTTP and MCP tools in parity per hard rule 13), (3) a tool is added/removed/renamed in `src/mad/adapters/inbound/mcp/server.py` (mirroring the HTTP boundary), or (4) a background component (lifespan-managed asyncio task, app-startup hook, or other no-request-surface operation) is added/removed/renamed that performs observable side effects. Cross-reference each row with its corresponding HTTP route or MCP tool, verify the operation's trigger, and re-describe the observable side effects (events, workspace actions). Ensure HTTP/MCP parity is maintained and the operation's bounded context (sessions, events, orchestration) is accurately placed.
  acknowledged_at_commit: 2c1a6dd28e3f16a6ed1ff5aba4368802f7cf799f
- path: docs/01-overview/scope.md
  section: overview
  kind: manual
  description: |
    What the service explicitly does NOT do (non-goals / out of scope). For
    Mad this is load-bearing: it launches external agents and streams their
    stdout — it NEVER parses tool calls, executes tools, or runs an agent loop
    (hard rule 1). Capture these boundaries.
  triggers:
    discovery_hint: |
      Statement of intent. No code path determines it. Track by age.
    paths: []
    max_age_days: 365
  produces:
    type: manual
  adapted_heuristic: null
  acknowledged_at_commit: 1589bf78aa2f26aa2f99c505819402e5b3020f46
- path: docs/01-overview/glossary.md
  section: overview
  kind: manual
  description: |
    The domain language used across these docs; one term = one definition
    (session, workspace, launcher, provider, event, hook, dispatcher, task,
    deployment policy, mount path, ...).
  triggers:
    discovery_hint: |
      Vocabulary; curated as the domain language evolves. No path trigger.
    paths: []
    max_age_days: 365
  produces:
    type: manual
  adapted_heuristic: null
  acknowledged_at_commit: 1589bf78aa2f26aa2f99c505819402e5b3020f46

# ---- 02 architecture ----------------------------------------------------
- path: docs/02-architecture/overview.md
  section: architecture
  kind: manual
  description: |
    Internal architecture narrative and a C4 level-2 (container) diagram in
    mermaid. Name the real style (hexagonal ports & adapters) and how a request
    or event flows through the layers.
  triggers:
    discovery_hint: |
      Architectural narrative requires judgement. Track by age; no single path
      trigger fires it directly.
    paths: []
    max_age_days: 180
  produces:
    type: manual
  adapted_heuristic: null
  acknowledged_at_commit: 1589bf78aa2f26aa2f99c505819402e5b3020f46
- path: docs/02-architecture/components.md
  section: architecture
  kind: heuristic
  description: |
    Internal modules and their responsibilities / boundaries: the core bounded
    contexts (sessions, events, orchestration) and the inbound/outbound adapter
    groups, plus the ports between them.
  triggers:
    discovery_hint: |
      The broad source root where module boundaries live (`src/mad/**`). Any
      change there suggests verifying the boundaries narrative is still right.
    paths:
    - src/mad/core/**
    - src/mad/adapters/**
    hint: |
      Module layout changed — verify components.md still reflects the internal
      boundaries (a new context, a new adapter group, a new port).
  produces:
    type: manual
  adapted_heuristic: |
    Re-author when a new bounded context appears under `core/`, a new adapter group under `adapters/inbound/` or `adapters/outbound/`, or a new port Protocol under `core/*/ports/`. Renames inside an existing module are captured by source-tree.md and do NOT need a rewrite.
  acknowledged_at_commit: 2c1a6dd28e3f16a6ed1ff5aba4368802f7cf799f
- path: docs/02-architecture/data-model.md
  section: architecture
  kind: heuristic
  description: |
    The persistent data model: the entities Mad owns, their key attributes and
    relationships, and the storage strategy actually used. Mad has no DB — the
    store is an append-only per-session JSONL event log (hard rule 6). Trace
    every claim to the domain models and the persistence adapter.
  triggers:
    discovery_hint: |
      The domain entities and the persistence layer. Here: the domain packages
      under each core context and the JSONL repository / workspace provisioner.
    paths:
    - src/mad/core/sessions/domain/**
    - src/mad/core/events/domain/**
    - src/mad/core/orchestration/domain/**
    - src/mad/adapters/outbound/persistence/**
    hint: |
      Domain models or the persistence adapter changed — verify data-model.md.
  produces:
    type: manual
  adapted_heuristic: |
    Re-author when a field is added/removed on Session (session.py), Event (event.py), or a Task/orchestration entity (task.py, workflow.py, git_result.py), when the JSONL line shape in jsonl_session_repository.py changes, or when the event_id strategy (event_id.py, UUIDv7, ADR-0005) changes. Also update when new deployment-wide config holders are added (e.g., DeploymentEffortConfig) or new exception types appear in the orchestration domain (e.g., workflow exceptions).
  acknowledged_at_commit: 2c1a6dd28e3f16a6ed1ff5aba4368802f7cf799f
- path: docs/02-architecture/source-tree.md
  section: architecture
  kind: deterministic
  description: |
    Exact ASCII tree of the application source root, from git-tracked files
    only — verbatim, deterministic, CI-diffable.
  triggers:
    discovery_hint: |
      The application source root (the package that holds production code).
    paths:
    - src/mad/**
  produces:
    type: script
    command: [gen_docs, source-tree]
    params_needed:
      root:
        description: Repo-relative path to the application source root.
        type: string
    params:
      root: src/mad
  adapted_heuristic: null
  acknowledged_at_commit: ece94c403c5be7257704a42260a13e4c6e185ada
- path: docs/02-architecture/test-tree.md
  section: architecture
  kind: deterministic
  description: |
    Exact ASCII tree of the test root, from git-tracked files only — verbatim,
    deterministic, CI-diffable.
  triggers:
    discovery_hint: |
      The test root (unit/integration/e2e).
    paths:
    - tests/**
  produces:
    type: script
    command: [gen_docs, test-tree]
    params_needed:
      root:
        description: Repo-relative path to the test root.
        type: string
    params:
      root: tests
  adapted_heuristic: null
  acknowledged_at_commit: ece94c403c5be7257704a42260a13e4c6e185ada

# ---- 03 contracts -------------------------------------------------------
# `api` is heuristic, not deterministic: regenerating the OpenAPI dump needs the
# app imported (mad + mcp + fastapi), but the shared docs-validate CI installs
# only `gen_docs`, not this package, so it cannot regenerate it and would raise a
# false deterministic-stale. The `produces` block stays so `gen_docs api`
# refreshes it LOCALLY (where the package is installed).
- path: docs/03-contracts/api.md
  section: contracts
  kind: heuristic
  description: |
    The HTTP API surface as an OpenAPI document, dumped from the application
    object. Reconstructable from `/raw` alone, never a dangling link.
  triggers:
    discovery_hint: |
      The HTTP route/handler/schema layer (the inbound HTTP adapter).
    paths:
    - src/mad/adapters/inbound/http/**
    hint: |
      The HTTP surface changed — re-run `gen_docs api` locally and re-ack.
  produces:
    type: script
    command: [gen_docs, api]
    params_needed:
      app_module:
        description: Importable module exposing the ASGI app object.
        type: string
      app_attr:
        description: Attribute name of the app object within that module.
        type: string
    params:
      app_module: mad.adapters.inbound.http.asgi
      app_attr: app
  adapted_heuristic: |
    Refresh with `gen_docs api` whenever a route or its request/response model changes under `adapters/inbound/http/`. Keep HTTP and MCP at parity (hard rule 13) — an HTTP route change implies an MCP tool change. Verify all new routes and schemas are reflected in the OpenAPI document; check Pydantic models in routes for field additions or modifications.
  acknowledged_at_commit: 2c1a6dd28e3f16a6ed1ff5aba4368802f7cf799f
- path: docs/03-contracts/events-published.md
  section: contracts
  kind: heuristic
  description: |
    The events Mad emits over its event log / SSE surface: event type, payload
    shape, and publish semantics (when/why emitted). Mad IS event-driven — the
    vocabulary includes `agent.output`, `session.status_idle`, `session.error`,
    and `agent.<provider>.hook.*` (ADR-0004, ADR-0008).
  triggers:
    discovery_hint: |
      The producer layer: the EventEmitter (single write gateway, hard rule 11),
      the launchers and use cases that emit, and the events domain.
    paths:
    - src/mad/core/events/**
    - src/mad/core/sessions/use_cases/**
    - src/mad/adapters/outbound/agents/**
    hint: |
      Event-producing code changed — verify the event type, payload, and
      publish semantics.
  produces:
    type: manual
  adapted_heuristic: |
    Event types are string literals (no central constants module). Re-author when a new `emit(...)` type string appears in a launcher (`adapters/outbound/agents/*`) or a use case, when the hook vocabulary (`agent.<provider>.hook.*`, ADR-0008) changes, or when the Event payload shape (event.py) changes. Verify event tables against all call sites: grep `emit(` under `src/mad/core/**` and `src/mad/adapters/outbound/agents/**` plus the hook router.
  acknowledged_at_commit: 2c1a6dd28e3f16a6ed1ff5aba4368802f7cf799f
- path: docs/03-contracts/events-consumed.md
  section: contracts
  kind: heuristic
  description: |
    The events/callbacks Mad ingests from outside: the claude-cli hook
    callbacks POSTed to the internal UDS adapter (`POST /_internal/hooks`),
    with the expected payload and handling semantics (ADR-0008). If a surface
    has none, mark `not applicable`.
  triggers:
    discovery_hint: |
      The inbound event/ingestion layer — here the internal hook adapter on a
      Unix domain socket.
    paths:
    - src/mad/adapters/inbound/internal/**
    - src/mad/adapters/outbound/agents/hooks/**
    hint: |
      Hook ingestion code changed — verify the consumed payload and semantics.
  produces:
    type: manual
  adapted_heuristic: |
    Re-author when `hooks_router.py` changes the accepted payload, when the
    `agent.<provider>.hook.*` vocabulary changes, or when the materialized
    `forward.sh` / `settings.local.json` under `outbound/agents/hooks/` change
    the set of forwarded hooks (closed list, ADR-0008).
  acknowledged_at_commit: 1589bf78aa2f26aa2f99c505819402e5b3020f46
- path: docs/03-contracts/jobs.md
  section: contracts
  kind: heuristic
  description: |
    Background / scheduled work and its semantics. Mad has no cron, but it runs
    a background dispatcher loop (orchestration) on a tick interval, plus
    auto-sync. Document the dispatcher's trigger cadence and side effects; mark
    classic cron `not applicable`.
  triggers:
    discovery_hint: |
      The scheduler/background-loop layer. Here: the orchestration dispatcher
      and its projection/clock adapters.
    paths:
    - src/mad/core/orchestration/use_cases/**
    - src/mad/adapters/outbound/orchestration/**
    hint: |
      Dispatcher / background-loop code changed — verify schedule and effects.
  produces:
    type: manual
  adapted_heuristic: |
    Re-author when dispatcher.py changes its tick cadence (MAD-tick / dispatcher_tick_interval_s), its start/stop lifecycle, the work it dispatches (Task domain or ordering changes), or new event types it emits. The git-result capture (issue #88) added task.git_result emission; future features should be documented in the events table similarly.
  acknowledged_at_commit: 2c1a6dd28e3f16a6ed1ff5aba4368802f7cf799f
- path: docs/03-contracts/external-dependencies.md
  section: contracts
  kind: heuristic
  description: |
    Third parties Mad relies on and their quirks (timeouts, retries, failure
    modes): the external agent CLIs (claude, opencode), GitHub (clone), and the
    runtime SDKs (anthropic, mcp, fastapi, uvicorn, httpx).
  triggers:
    discovery_hint: |
      The dependency manifests and the outbound integration modules where
      third-party clients/processes are wired.
    paths:
    - pyproject.toml
    - requirements.txt
    - src/mad/adapters/outbound/**
    hint: |
      Dependencies or outbound adapters changed — verify
      external-dependencies.md.
  produces:
    type: manual
  adapted_heuristic: |
    Re-author when a runtime dependency in `pyproject.toml` changes, when a new
    outbound adapter (launcher provider) appears under `outbound/agents/`, or
    when the spawn contract / timeout handling in a launcher changes.
  acknowledged_at_commit: db4b411c7d95cb508e2423eae428fbce76fd4032

# ---- 04 conventions -----------------------------------------------------
- path: docs/04-conventions/api-design.md
  section: conventions
  kind: heuristic
  description: |
    API conventions: the `/v1` prefix, strongly-typed Pydantic request/response
    models (hard rule 9), the response_model discipline, and HTTP<->MCP tool
    parity (hard rule 13).
  triggers:
    discovery_hint: |
      The inbound HTTP layer and the MCP tool surface where conventions are
      observable (routers, request/response models).
    paths:
    - src/mad/adapters/inbound/http/**
    - src/mad/adapters/inbound/mcp/server.py
    hint: |
      Inbound HTTP/MCP code changed — verify api-design.md conventions.
  produces:
    type: manual
  adapted_heuristic: |
    Re-author when route prefixes/tags change, when a route stops declaring a Pydantic body/response_model (hard rule 9 violation), when the HTTP<->MCP parity rule (hard rule 13, ADR-0012) is affected, or when new router modules are added to the five-module table.
  acknowledged_at_commit: 2c1a6dd28e3f16a6ed1ff5aba4368802f7cf799f
- path: docs/04-conventions/auth.md
  section: conventions
  kind: heuristic
  description: |
    Authn/authz model and how it is enforced. Mad has NO in-app auth layer —
    authentication happens at the Cloudflare edge (Service-Token Access,
    ADR-0010); the app trusts its network boundary. Document the edge model,
    `MAD_MCP_ALLOWED_HOSTS`, and token hygiene (hard rule 2).
  triggers:
    discovery_hint: |
      Where any auth/host enforcement happens. Here it is minimal: MCP host
      allowlisting and the app boundary; the real gate is the edge.
    paths:
    - src/mad/adapters/inbound/mcp/server.py
    - src/mad/adapters/inbound/http/app.py
    hint: |
      Auth / host-allowlist code changed — verify auth.md and the edge model.
  produces:
    type: manual
  adapted_heuristic: |
    Re-author when `MAD_MCP_ALLOWED_HOSTS` handling changes, when any in-app
    auth is introduced (today there is none — edge only), or when the token
    hygiene flow (clone token stripped from the remote, hard rule 2) changes.
    Cross-reference docs/05-operations/runbooks/cloudflare-tunnel.md.
  acknowledged_at_commit: db4b411c7d95cb508e2423eae428fbce76fd4032
- path: docs/04-conventions/error-handling.md
  section: conventions
  kind: heuristic
  description: |
    Error taxonomy and how errors surface to callers: the domain exceptions and
    the FastAPI exception handlers that map them to HTTP status codes / bodies.
  triggers:
    discovery_hint: |
      The domain exception layer and the inbound HTTP exception handlers.
    paths:
    - src/mad/core/sessions/domain/exceptions/**
    - src/mad/adapters/inbound/http/app.py
    hint: |
      Exception classes or handlers changed — verify error-handling.md.
  produces:
    type: manual
  adapted_heuristic: |
    Re-author when a domain exception is added under `core/*/domain/exceptions/`, or when an `@app.exception_handler(...)` in app.py adds/changes an exception->status mapping or the response body.
  acknowledged_at_commit: ece94c403c5be7257704a42260a13e4c6e185ada
- path: docs/04-conventions/logging.md
  section: conventions
  kind: heuristic
  description: |
    Logging/observability conventions. Mad's source of truth is the per-session
    JSONL event log written via the EventEmitter; every action is also printed
    to stdout (hard rule 6). There is no central logger module — document this
    dual write path and the event-log-as-truth model.
  triggers:
    discovery_hint: |
      Where the durable record and stdout are produced — the persistence
      adapter and the event emitter.
    paths:
    - src/mad/adapters/outbound/persistence/**
    - src/mad/core/events/emitter.py
    hint: |
      Event-log / emit path changed — verify logging.md.
  produces:
    type: manual
  adapted_heuristic: |
    Re-author when the JSONL log format (jsonl_session_repository.py) changes,
    when the EventEmitter write path (emitter.py, hard rule 11) changes, or if a
    central logger is ever introduced (today there is none — log == event log +
    stdout).
  acknowledged_at_commit: ece94c403c5be7257704a42260a13e4c6e185ada
- path: docs/04-conventions/quality.md
  section: conventions
  kind: heuristic
  description: |
    Linters / formatters and the quality gates: ruff, mypy (strict on
    mad.core), import-linter (architecture contracts), pre-commit, gitleaks,
    pip-audit (ADR-0002).
  triggers:
    discovery_hint: |
      The linter/formatter/quality configs present in this repo.
    paths:
    - pyproject.toml
    - .pre-commit-config.yaml
    hint: |
      Lint/format/quality config changed — verify quality.md.
  produces:
    type: manual
  adapted_heuristic: |
    Re-author when `[tool.ruff]`, `[tool.mypy]`, `[tool.importlinter]`, or
    `[tool.coverage]` in pyproject.toml change, or when a pre-commit hook is
    added/removed. Cross-reference ADR-0002.
  acknowledged_at_commit: db4b411c7d95cb508e2423eae428fbce76fd4032
- path: docs/04-conventions/testing-strategy.md
  section: conventions
  kind: heuristic
  description: |
    Test layers (unit/integration/e2e), the eight testing heuristics
    (docs/04-conventions/testing-heuristics.md), coverage expectations, and the
    fakes-in-tests/support convention (ADR-0001, ADR-0003).
  triggers:
    discovery_hint: |
      The test root and the test config / heuristics docs this repo uses.
    paths:
    - tests/**
    - pyproject.toml
    - docs/04-conventions/testing-heuristics.md
    hint: |
      Test infrastructure or the heuristics changed — verify
      testing-strategy.md.
  produces:
    type: manual
  adapted_heuristic: |
    Re-author when test-layer layout under `tests/` reorganizes, when coverage thresholds in CI/pyproject change, when docs/04-conventions/testing-heuristics.md changes the eight rules, or when new AgentLauncher or orchestration doubles are added to tests/support/. Document all shared doubles explicitly by type and purpose; Fakes live in tests/support (ADR-0003).
  acknowledged_at_commit: 2c1a6dd28e3f16a6ed1ff5aba4368802f7cf799f
- path: docs/04-conventions/testing-heuristics.md
  section: conventions
  kind: manual
  description: |
    The eight operational testing heuristics (negative twins, single-contract
    assertions, fakes in `tests/support/`, OpenAPI + SSE contract tests,
    state-based polling, bounded termination) plus the pre-merge checklist
    and enforcement chain (hard rule 10, write-test/test-critic loop).
  triggers:
    discovery_hint: |
      Judgement-derived testing doctrine, curated from audits of the suite.
      Not mechanically derivable from a single source path. Track by age.
    paths: []
    max_age_days: 180
  produces:
    type: manual
  adapted_heuristic: null
  acknowledged_at_commit: 2151b5631d1aff540c1c172229e3f5c778a1c6b1

# ---- 05 operations ------------------------------------------------------
- path: docs/05-operations/ci-cd.md
  section: operations
  kind: heuristic
  description: |
    Pipeline stages and what gates each one. The skeleton (job/step structure)
    is regenerated by the script; the narrative of what each stage gates is
    authored. Covers ci, release (semantic-release), testpypi-preview,
    docs-validate, docs-sync, ai-develop-on-issue.
  triggers:
    discovery_hint: |
      The CI/CD workflows directory.
    paths:
    - .github/workflows/**
    hint: |
      Workflows changed — regenerate the skeleton and update the narrative of
      what each stage gates.
  produces:
    type: script
    command: [gen_docs, ci-cd]
    params_needed:
      workflows_dir:
        description: Directory containing CI/CD workflow files.
        type: string
    params:
      workflows_dir: .github/workflows
  adapted_heuristic: |
    Re-author when any file under `.github/workflows/` is added, removed, or
    materially changed. Keep the job/step listing in sync with `gen_docs ci-cd`
